
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户 Dashboard - Apex Speed Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .card .company {
            color: #666;
            margin-bottom: 20px;
        }
        .card .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card .stat {
            text-align: center;
        }
        .card .stat .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .card .stat .label {
            font-size: 0.9em;
            color: #666;
        }
        .card .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        .card .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 客户 Dashboard</h1>
            <p>Apex Speed Labs | 数据驱动的客户管理</p>
        </div>
        
        <div class="cards-grid">

            <div class="card">
                <h3>Demo 客户 - 新加坡房产中介</h3>
                <div class="company">PropNex Realty</div>
                <div class="stats">
                    <div class="stat">
                        <div class="value">0</div>
                        <div class="label">线索数</div>
                    </div>
                    <div class="stat">
                        <div class="value">Professional</div>
                        <div class="label">套餐</div>
                    </div>
                </div>
                <a href="demo_client_001.html" class="btn">查看 Dashboard</a>
            </div>

        </div>
    </div>
</body>
</html>
